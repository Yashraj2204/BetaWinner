<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A2E20" />

    <!-- Primary SEO -->
    <title>EcoTrace | Track &amp; Reduce Your Carbon Footprint</title>
    <meta name="description" content="EcoTrace helps you understand, track and reduce your personal carbon footprint. Log daily activities, see science-backed CO₂ emissions, and build climate-positive habits with streaks and achievements." />
    <meta name="keywords" content="carbon footprint, CO2 tracker, climate action, sustainability, emission calculator, eco tracker" />
    <meta name="author" content="EcoTrace" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="EcoTrace — Carbon Footprint Tracker" />
    <meta property="og:description" content="Track your daily CO₂ emissions, get personalized reduction tips and build lasting climate-positive habits." />
    <meta property="og:url"         content="https://beta-winner.vercel.app" />
    <meta property="og:image"       content="https://images.unsplash.com/photo-1761495375895-4d99be6a0f19?w=1200&q=80" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="EcoTrace — Carbon Footprint Tracker" />
    <meta name="twitter:description" content="Track your daily CO₂ emissions, get personalized reduction tips and build lasting climate-positive habits." />
    <meta name="twitter:image"       content="https://images.unsplash.com/photo-1761495375895-4d99be6a0f19?w=1200&q=80" />

    <!-- Fonts — preconnect first for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin="anonymous" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "EcoTrace",
      "url": "https://beta-winner.vercel.app",
      "description": "Carbon footprint tracker with science-backed emission factors, visual analytics and personalised reduction tips.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "All",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <!-- Suppress harmless PerformanceServerTiming DataCloneErrors -->
    <script src="%PUBLIC_URL%/error-logger.js"></script>
  </head>
  <body>
    <noscript>
      <p style="font-family:sans-serif;padding:2rem;text-align:center">
        EcoTrace requires JavaScript to run.
        Please enable JavaScript in your browser settings.
      </p>
    </noscript>
    <div id="root"></div>
  </body>
</html>
